name: ci

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  rust-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - name: Format (check)
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Doc tests
        run: cargo test --doc -p rsshogi --all-features
      - name: Test
        run: cargo nextest run -p rsshogi --tests --all-features

  rust-test-cross-platform:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: Rust tests
        run: cargo test -p rsshogi --tests --all-features

  rust-architecture-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: avx2
            rustflags: "-C target-feature=+avx2,+sse4.1,+ssse3,+bmi1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - name: Compile ${{ matrix.name }}
        run: cargo check -p rsshogi --all-targets --all-features
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install --upgrade ruff
      - name: Ruff (lint)
        run: ruff check examples/python
      - name: Ruff (format check)
        run: ruff format --check examples/python

  python-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --dev
      - name: Typecheck (ty)
        run: uv run ty check tests/python/typecheck_record_api.py --extra-search-path crates/rsshogi-py/python
